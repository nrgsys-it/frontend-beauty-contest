<div class="flex h-full bg-(--color-ink-black-900)">
  @if(isUserSelected()){
    <div class="flex-3 flex flex-col bg-(--color-ink-black-950)">
      <div class="flex-1 bg-(--color-ink-black-900) m-3 rounded-3xl">
        @if (conversations$ | async; as conversations) {
          <div class="flex justify-center p-4">
            @for (conversation of conversations; track conversation.id) {
              <button class="hover:bg-(--color-ink-black-500) min-w-full text-white font-bold py-2 px-4 rounded-full bg-(--color-ink-black-400)"
                      (click)="selectConversation(conversation)">
                <i class="fa fa-comment mr-2"></i>
                {{ conversation.title }}
              </button>
            }
          </div>
        }
      </div>
    </div>
    <div class="flex-9 flex flex-col bg-(--color-ink-black-950)">
      <div class="flex flex-1 flex-col bg-(--color-ink-black-900) m-3 rounded-3xl">
        @if(isConversationSelected){
          <div class="flex-1 overflow-y-auto p-4 rounded-t-3xl flex flex-col gap-2">
            @for (msg of sentMessages; track $index) {
              <div class="self-end max-w-xs rounded-2xl bg-white px-4 py-2 text-sm text-black">
                {{ msg }}
              </div>
            }
          </div>
          <div class="border-t border-white/10 p-3">
            <div class="flex items-center gap-3 rounded-2xl bg-[var(--color-ink-black-950)] px-3 py-2">
              <input
                #messageInput
                type="text"
                [(ngModel)]="messageText"
                (input)="messageText = messageInput.value"
                (keydown.enter)="sendMessage()"
                placeholder="Scrivi un messaggio..."
                class="flex-1 bg-transparent text-white outline-none placeholder:text-white/40"
              />
              <button
                type="button"
                (click)="sendMessage()"
                [disabled]="messageText.length === 0"
                class="rounded-xl bg-white px-4 py-2 text-sm font-semibold text-black"
              >
                Invia
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  }@else{
    <div class="flex">
      <p class="text-white">Seleziona un utente prima di procedere</p>
    </div>
  }
</div>
